                        ssl_certificate "/etc/letsencrypt/live/twidapp.com/cert.pem";                   ssl_certificate_key "/etc/letsencrypt/live/twidapp.com/privkey.pem";
                        ssl_trusted_certificate "/etc/letsencrypt/live/twidapp.com/fullchain.pem";

                        root /twid/merchant/public;
                        access_log /var/log/nginx/api_access_log;
                        error_log /var/log/nginx/api_error_log crit;
                        index index.php index.html index.htm;

                        location / {

                                if ($request_method = OPTIONS ) {
                                        add_header "Access-Control-Allow-Origin"  *;
                                                return 200;

                                }

                                try_files $uri $uri/ /index.php?$args;
                                if ($request_method = OPTIONS ) {
                                        add_header "Access-Control-Allow-Origin"  *;
                                                return 200;

                                }
                                add_header "Access-Control-Allow-Origin"  *;
                        }

                        location ~ \.php$ {
                                if ($http_origin ~ "^$") {
                                        set $http_origin "merchant.dev.twidapp.com";
                                }
                                if ($http_origin !~ '.*\.dev\.twidapp\.com$') {
                                        return 400;
                                }

                                set $temp_referer $http_referer;
                                if ($temp_referer ~ "^$") {
                                        set $temp_referer "https://merchant.dev.twidapp.com";
                                }

                                if ($temp_referer !~ '^https?://.*twidapp\.com.*') {
                                        return 400;
                                }

                                try_files $uri =404;
                                        fastcgi_param  HTTP_x-forwarded-host $http_host;

                                fastcgi_pass unix:/run/php-fpm/www.sock;
                                fastcgi_index index.php;
                                fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                                include fastcgi_params;
                                add_header "Access-Control-Allow-Origin"  *;
                                add_header X-Content-Type-Options nosniff;
                                add_header Strict-Transport-Security "max-age=15768000; includeSubdomains; preload";
                                add_header X-XSS-Protection "1; mode=block";
                                add_header X-Frame-Options DENY;
                                add_header Content-Security-Policy "frame-ancestors 'self';";
                                add_header Set-Cookie "Path=/; HttpOnly; Secure";
                                add_header Referrer-Policy 'origin-when-cross-origin';
                                add_header Vary 'twid__session,XSRF-TOKEN';


                                # Hide PHP headers
                                fastcgi_hide_header             X-Powered-By;
                                fastcgi_hide_header             X-CF-Powered-By;
                        }
                        location ~ /\. {
                                deny  all;
                        }
                }

