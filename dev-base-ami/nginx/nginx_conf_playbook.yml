    - name: updating configuration conf.d/security.conf
      copy:
        dest: "/etc/nginx/conf.d/security.conf"
        content: |
                server_tokens off;
                ssl_dhparam /etc/ssl/certs/dhparam.pem;

                ssl_session_timeout 60m;
                ssl_session_cache shared:SSL:60m;
                ssl_session_tickets off;

                #ssl_protocols TLSv1.1 TLSv1.2;
                ssl_protocols TLSv1.2 TLSv1.3;
                #ssl_ciphers 'ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256:ECDHE-ECDSA-AES128-SHA:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA:ECDHE-ECDSA-AES256-SHA384:ECDHE-ECDSA-AES256-SHA:ECDHE-RSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES128-SHA:DHE-RSA-AES256-SHA256:DHE-RSA-AES256-SHA:AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-SHA256:AES256-SHA256:AES128-SHA:AES256-SHA:!DSS';
                #ssl_ciphers 'ECDHE-RSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-CCM:DHE-RSA-AES256-CCM8:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-CCM:DHE-RSA-AES128-CCM8:DHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256';
                ssl_prefer_server_ciphers on;
                ssl_ecdh_curve secp521r1:secp384r1;
                ssl_ciphers EECDH+AESGCM:EECDH+AES256;

                #New
                ssl_buffer_size 8k;
                ssl_stapling on;
                ssl_stapling_verify on;

                #ssl_stapling on;
                #ssl_stapling_verify on;
                resolver 8.8.8.8 8.8.4.4 valid=300s;
                #resolver_timeout 30s;

                #add_header Strict-Transport-Security "max-age=15768000; includeSubdomains; preload";
                add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains; preload' always;
                #add_header X-Frame-Options SAMEORIGIN;
                add_header X-Frame-Options DENY;
                add_header X-XSS-Protection "1; mode=block";
                #add_header X-Content-Type-Options nosniff;
                add_header Content-Security-Policy "default-src 'self' *.google.com *.amazon.com;";
                add_header Set-Cookie "Path=/; HttpOnly; Secure";
                add_header Referrer-Policy 'origin';

    - name: updating configuration conf.d/php-fpm.conf
      copy:
        dest: "/etc/nginx/conf.d/php-fpm.conf"
        content: |
                # PHP-FPM FastCGI server
                # network or unix domain socket configuration
                upstream php-fpm {
                server unix:/run/php-fpm/www.sock;
                }

    - name: updating configuration snippets/headers.conf
      copy:
        dest: "/etc/nginx/snippets/headers.conf"
        content: | 
                location ^~ /.well-known/acme-challenge/ {
                allow all;
                root /var/lib/letsencrypt/;
                default_type "text/plain";
                try_files $uri =404;
                }
                add_header X-Content-Type-Options nosniff;
                add_header Strict-Transport-Security "max-age=15768000; includeSubdomains; preload";
                add_header X-XSS-Protection "1; mode=block";
                add_header Content-Security-Policy-Report-Only "default-src 'self'";
    
    - name: updating configuration conf.d/betanewhttp.conf
