---
- name: update configuration files
  hosts: localhost
  gather_facts: no
  become: true

  tasks:
    - name: updating configuration selinux config
      copy:
        dest: "/etc/selinux/config"
        content: |
          SELINUX=disabled

    # - name: adding bastion proxy 
    #   shell: |
    #     echo 'proxy=http://172.31.21.180:3128/' >> /etc/yum.conf

    # - name: adding proxy 
    #   shell: |
    #     echo '172.31.21.180 bastion.twidpay.com' >> /etc/hosts

    - name: set hostname
      shell: |
        sudo hostnamectl set-hostname "dev-php84"
    
    - name: updating configuration cloud config
      copy:
        dest: "/etc/cloud/cloud.cfg"
        content: |
          users:
            - default
          disable_root: true
          mount_default_fields: [~, ~, 'auto', 'defaults,nofail,x-systemd.requires=cloud-init.service,_netdev', '0', '2']
          resize_rootfs_tmp: /dev
          ssh_pwauth: false
          preserve_hostname: true
          ssh_deletekeys: true
          ssh_genkeytypes: ['rsa', 'ecdsa', 'ed25519']
          syslog_fix_perms: ~
          disable_vmware_customization: false
          cloud_init_modules:
            - migrator
            - seed_random
            - bootcmd
            - write_files
            - growpart
            - resizefs
            - disk_setup
            - mounts
            - set_hostname
            - update_hostname
            - update_etc_hosts
            - ca_certs
            - rsyslog
            - users_groups
            - ssh
          cloud_config_modules:
            - ssh_import_id
            - locale
            - set_passwords
            - rh_subscription
            - spacewalk
            - yum_add_repo
            - ntp
            - timezone
            - disable_ec2_metadata
            - runcmd
          cloud_final_modules:
            - package_update_upgrade_install
            - write_files_deferred
            - puppet
            - chef
            - ansible
            - mcollective
            - salt_minion
            - reset_rmc
            - rightscale_userdata
            - scripts_vendor
            - scripts_per_once
            - scripts_per_boot
            - scripts_per_instance
            - scripts_user
            - ssh_authkey_fingerprints
            - keys_to_console
            - install_hotplug
            - phone_home
            - final_message
            - power_state_change
          system_info:
            distro: rocky
            default_user:
              name: rocky
              lock_passwd: True
              gecos: rocky Cloud User
              groups: [adm, systemd-journal]
              sudo: ["ALL=(ALL) NOPASSWD:ALL"]
              shell: /bin/bash
            network:
              renderers: ['sysconfig', 'eni', 'netplan', 'network-manager', 'networkd']
            paths:
              cloud_dir: /var/lib/cloud/
              templates_dir: /etc/cloud/templates/
            ssh_svcname: sshd

    - name: partition mount script
      copy:
        dest: "/tmp/mount.sh"
        content: |
          #!/bin/bash

          # Get the root mount device
          root_dev=$(readlink -f /dev/mapper/$(lsblk -no NAME,MOUNTPOINT | grep ' /$' | awk '{print $1}'))
          
          # Get the backing disk of the root volume
          root_disk=$(lsblk -no pkname "$root_dev")
          
          # List all nvme disks
          all_disks=($(lsblk -d -n -o NAME | grep nvme))
          
          # Select the other disk
          disk_to_format=""
          for dev in "${all_disks[@]}"; do
              if [[ "$dev" != "$root_disk" ]]; then
                  disk_to_format="/dev/$dev"
                  break
              fi
          done
          
          if [[ -z "$disk_to_format" ]]; then
              echo "No available disk to format"
              exit 1
          fi
          
          echo "Formatting disk: $disk_to_format"
          mkfs.xfs -f "$disk_to_format"
          
          # Wait for device to settle
          udevadm settle
          sleep 2
          
          uuid=$(blkid -o value -s UUID "$disk_to_format")
          
          if [[ -z "$uuid" ]]; then
              echo "ERROR: UUID not found for $disk_to_format"
              exit 1
          fi
          
          mkdir -p /twid
          mount "$disk_to_format" /twid
          
          echo "UUID=$uuid  /twid  xfs  defaults,nofail 0 2" >> /etc/fstab
    
    - name: update /etc/fstab
      shell: |
        sudo chmod +x /tmp/mount.sh
        sudo bash /tmp/mount.sh
        sudo rm -f /tmp/mount.sh
        
    - name: Create swap
      shell: |
        dd if=/dev/zero of=/swapfile1 bs=1M count=512 && \
        chmod 600 /swapfile1 && \
        mkswap /swapfile1 && \
        swapon /swapfile1 && \
        echo '/swapfile1 swap swap defaults 0 0' | sudo tee -a /etc/fstab

